# Domain Relations: Life Skills Education
# Vztahy mezi entitami v doméně
# Verze: 1.0.0

metadata:
  version: "1.0.0"
  created: "2026-01-08"
  total_relations: 52

# =============================================================================
# RELATION TYPES
# =============================================================================
relation_types:
  - id: contains
    name: "Obsahuje"
    description: "Hierarchický vztah - parent obsahuje child"
    inverse: "is_part_of"

  - id: is_part_of
    name: "Je součástí"
    description: "Hierarchický vztah - child je součástí parent"
    inverse: "contains"

  - id: develops
    name: "Rozvíjí"
    description: "Aktivita/metoda rozvíjí dovednost"
    inverse: "is_developed_by"

  - id: supports
    name: "Podporuje"
    description: "Entita podporuje jinou entitu"
    inverse: "is_supported_by"

  - id: uses
    name: "Používá"
    description: "Aktér používá nástroj/metodu"
    inverse: "is_used_by"

  - id: targets
    name: "Cílí na"
    description: "Produkt/aktivita cílí na skupinu"
    inverse: "is_targeted_by"

  - id: mitigates
    name: "Mitiguje"
    description: "Řešení mitiguje riziko"
    inverse: "is_mitigated_by"

  - id: implements
    name: "Implementuje"
    description: "Konkrétní implementace frameworku/principu"
    inverse: "is_implemented_by"

  - id: measures
    name: "Měří"
    description: "Nástroj měří dovednost/kompetenci"
    inverse: "is_measured_by"

  - id: prerequisite_for
    name: "Je prerekvizitou pro"
    description: "Dovednost A je prerekvizitou pro dovednost B"
    inverse: "requires"

  - id: facilitates
    name: "Facilituje"
    description: "Aktér facilituje proces"
    inverse: "is_facilitated_by"

# =============================================================================
# RELATIONS - ACTORS
# =============================================================================
relations:
  # === CHILD relations ===
  - from: child
    to: meta_skills
    type: develops
    description: "Dítě rozvíjí meta-dovednosti"

  - from: child
    to: ai_assistant
    type: uses
    description: "Dítě používá AI asistenta jako cognitive mirror"

  - from: child
    to: metacognition
    type: develops
    description: "Dítě rozvíjí metakognici během kritického období"
    critical_period: "11-17 let"

  - from: child
    to: executive_functions
    type: develops
    description: "Dítě rozvíjí exekutivní funkce"
    critical_period: "10-15 let"

  # === PARENT relations ===
  - from: parent
    to: child
    type: facilitates
    description: "Rodič facilituje učení dítěte"

  - from: parent
    to: workshop
    type: uses
    description: "Rodič používá workshop pro metodické vedení"

  - from: parent
    to: ai_assistant
    type: uses
    description: "Rodič monitoruje AI interakce dítěte"

  - from: parent
    to: metacognitive_scaffolding
    type: implements
    description: "Rodič implementuje metakognitivní scaffolding"

  # === TEACHER relations ===
  - from: teacher
    to: child
    type: facilitates
    description: "Učitel facilituje učení dítěte"

  - from: teacher
    to: phenomenon_based_learning
    type: implements
    description: "Učitel implementuje PhBL projekty"

  - from: teacher
    to: curriculum
    type: uses
    description: "Učitel používá kurikulum"

  # === AI ASSISTANT relations ===
  - from: ai_assistant
    to: cognitive_mirror
